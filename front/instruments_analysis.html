

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instruments Analysis Viewer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-purple: #c084fc;
            --border-color: #334155;
            --error-color: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.7;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }

        header h1 {
            font-size: 2rem;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        /* 状態表示用（ローディング・エラー・ボタン） */
        .controls {
            text-align: center;
            margin-bottom: 2rem;
        }

        .btn {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: var(--bg-color);
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }

        .status {
            margin-top: 1rem;
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        .error { color: var(--error-color); }

        /* 解析結果の出力エリアのスタイル */
        .meta-info {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .meta-info span { font-weight: bold; color: var(--accent-blue); }

        /* 動的に生成されるMarkdownコンテンツの装飾 */
        #output h3 {
            font-size: 1.5rem;
            margin: 2rem 0 1rem 0;
            padding-bottom: 0.4rem;
            border-bottom: 2px solid var(--border-color);
            color: var(--text-main);
        }

        #output h4 {
            font-size: 1.2rem;
            color: var(--accent-blue);
            margin: 1.5rem 0 0.5rem 0;
        }

        #output p { margin-bottom: 1rem; }

        #output ul {
            list-style: none;
            padding-left: 0;
            margin-bottom: 1.5rem;
        }

        #output li {
            margin-bottom: 0.75rem;
            position: relative;
            padding-left: 1.2rem;
        }

        #output li::before {
            content: "•";
            color: var(--accent-purple);
            position: absolute;
            left: 0;
            font-weight: bold;
        }

        /* ネストされたリスト（2階層目） */
        #output li ul { margin-top: 0.5rem; margin-bottom: 0; }
        #output li ul li { color: #cbd5e1; font-size: 0.95rem; }
        #output li ul li::before { content: "-"; color: var(--text-muted); }

        #output strong {
            color: #fff;
            background: linear-gradient(transparent 70%, rgba(56, 189, 248, 0.2) 0%);
            padding: 0 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>INSTRUMENTS ANALYSIS</h1>
    </header>

    <div class="controls">
        <button class="btn" id="fetch-btn">データを読み込む</button>
        <div id="status-message" class="status"></div>
    </div>

    <div id="meta-container"></div>
    <div id="output"></div>
</div>

<script>
    // ターゲットURL
    const API_URL = "https://d3jiguo628m5ch.cloudfront.net/instruments-analysis/?prompt=%E7%A7%81%E3%81%AE%E8%A8%98%E9%8C%B2%E3%82%92%E6%95%B4%E7%90%86%E3%81%97%E3%81%A6%EF%BC%81";

    document.getElementById('fetch-btn').addEventListener('click', fetchData);

    async function fetchData() {
        const statusEl = document.getElementById('status-message');
        const outputEl = document.getElementById('output');
        const metaEl = document.getElementById('meta-container');
        
        // 画面の初期化
        statusEl.textContent = "データを取得中...";
        statusEl.className = "status";
        outputEl.innerHTML = "";
        metaEl.innerHTML = "";

        try {
            const response = await fetch(API_URL);
            
            if (!response.ok) {
                throw new Error(`HTTPエラー! ステータス: ${response.status}`);
            }

            const data = await response.json();
            statusEl.textContent = ""; // 成功したらステータスを消す

            // 1. メタ情報（解析件数）の表示
            if (data.analyzed_count) {
                metaEl.innerHTML = `<div class="meta-info">Analyzed Count: <span>${data.analyzed_count}</span> records</div>`;
            }

            // 2. 解析結果（Markdownテキスト）のパースと表示
            if (data.analysis_result) {
                outputEl.innerHTML = parseMarkdown(data.analysis_result);
            } else {
                outputEl.innerHTML = "<p>解析結果のデータが空でした。</p>";
            }

        } catch (error) {
            console.error("Fetch エラー:", error);
            statusEl.textContent = `データの取得に失敗しました。詳細: ${error.message}`;
            statusEl.className = "status error";
        }
    }

    /**
     * 簡易的なMarkdown → HTML 変換関数
     * (今回のデータ形式に特化させています)
     */
    function parseMarkdown(text) {
        let html = text;

        // エスケープ処理（XSS対策）
        html = html
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");

        // 1. 強調太字 **text** -> <strong>text</strong>
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

        // 2. 見出し ### text -> <h3>text</h3>
        html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
        // 4. 見出し #### text -> <h4>text</h4>
        html = html.replace(/^#### (.*?)$/gm, '<h4>$1</h4>');

        // 3. 箇条書きの処理
        // 行ごとに分割してループ処理
        const lines = html.split('\n');
        let inList = false;
        let inSubList = false;
        let resultLines = [];

        for (let line of lines) {
            // 2階層目の箇条書き (インデントがある `* ` または `- `)
            if (/^\s+[\*\-]\s(.*)$/.test(line)) {
                if (!inSubList) {
                    inSubList = true;
                    resultLines.push('<ul>');
                }
                const content = line.replace(/^\s+[\*\-]\s/, '');
                resultLines.push(`<li>${content}</li>`);
            } else {
                // 2階層目が終わった場合
                if (inSubList) {
                    inSubList = false;
                    resultLines.push('</ul>');
                }

                // 1階層目の箇条書き (`* ` から始まる)
                if (/^[\*\-]\s(.*)$/.test(line)) {
                    if (!inList) {
                        inList = true;
                        resultLines.push('<ul>');
                    }
                    const content = line.replace(/^[\*\-]\s/, '');
                    resultLines.push(`<li>${content}`); // 子要素が入る可能性があるので閉じタグは保留
                } else {
                    // 1階層目が終わった場合
                    if (inList) {
                        // 保留していたliの閉じとulの閉じ
                        resultLines[resultLines.length - 1] += '</li>';
                        inList = false;
                        resultLines.push('</ul>');
                    }

                    // 通常の段落（空行、見出し以外）
                    if (line.trim() !== '' && !/^<h[34]>/.test(line)) {
                        resultLines.push(`<p>${line}</p>`);
                    } else {
                        resultLines.push(line);
                    }
                }
            }
        }
        
        // ループ終了後の閉じ処理
        if (inSubList) resultLines.push('</ul>');
        if (inList) resultLines.push('</li></ul>');

        return resultLines.join('\n');
    }
</script>

</body>
</html>
