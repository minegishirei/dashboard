<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>instruments</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --border-color: #f1f5f9;
            --inner-bg: #f1f5f9;
            --accent-bg: #eff6ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            margin: 0;
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.025em;
        }

        .header-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .data-source {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: monospace;
        }

        .back-link {
            text-decoration: none;
            color: var(--primary);
            font-size: 0.875rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            background: var(--accent-bg);
            transition: all 0.2s ease;
        }

        .back-link:hover {
            background: var(--primary);
            color: white;
        }

        #status {
            padding: 16px;
            margin-bottom: 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            display: none;
            text-align: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; }
        }

        .status-loading {
            display: block !important;
            background-color: #e0f2fe;
            color: #0369a1;
        }

        .status-error {
            display: block !important;
            background-color: #fee2e2;
            color: #991b1b;
        }

        .log-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .log-item {
            background: var(--card-bg);
            border: 1px solid #edf2f7;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.01);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .log-item:hover {
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 10px;
            margin-bottom: 12px;
        }

        .log-id {
            font-weight: 700;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .log-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            background-color: #f1f5f9;
            color: #475569;
        }

        .log-body {
            margin-bottom: 0;
        }

        .log-text-container {
            padding: 4px 0;
            margin-bottom: 12px;
        }

        /* 改行コード(\n)や連続したスペースを綺麗に維持して表示するコア設定 */
        .log-text {
            font-size: 1rem;
            color: var(--text-main);
            white-space: pre-wrap; 
            word-break: break-all;
            margin: 0 0 8px 0;
        }

        .log-submeta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin: 0;
            font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
        }

        /* 関連ノードセクションの改善 */
        .related-node-card {
            margin-top: 16px;
            padding: 16px;
            background: var(--accent-bg);
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        .related-node-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .related-node-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
            display: block;
            margin-bottom: 8px;
        }

        .related-node-title:hover {
            text-decoration: underline;
        }

        .related-node-content {
            font-size: 0.875rem;
            color: var(--text-muted);
            line-height: 1.5;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <div class="header-info">
                <h1>楽器ログビューア</h1>
                <div class="data-source">Source: d3jiguo628m5ch.cloudfront.net</div>
            </div>
            <a href="main.html" class="back-link">← ダッシュボードへ</a>
        </header>

        <div id="status" class="status-loading">データを読み込み中...</div>

        <div id="log-container" class="log-list"></div>
    </div>

    <script>
        const API_URL = 'https://d3jiguo628m5ch.cloudfront.net/instruments/';

        // dataUrl を使って main.json からネットワークを生成します
        const dataUrl = 'https://raw.githubusercontent.com/minegishirei/dashboard/refs/heads/main/data/psy/json/main.json';
        //const dataUrl = 'file:///Users/minebeaver/myworking/dashboard/data/psy/json/main2.json';
        // topic の順序定義（ローカルファイルを現在のページ URL から解決）
        const topicFile = 'https://raw.githubusercontent.com/minegishirei/dashboard/refs/heads/main/data/psy/json/topic.json';

        async function fetchPsyNetwork() {
            const [resMain, resTopic] = await Promise.all([
            fetch(dataUrl),
            fetch(topicFile).catch(() => null)
            ]);
            const data = await resMain.json();
            const topics = (resTopic && resTopic.ok) ? (await resTopic.json()) : [];
            const practiceResults = data.practiceResults || [];
            const nodes = data.nodeDataArray || [];
            const links = data.linkDataArray || [];
            return [nodes, links, topics, practiceResults];
        }

        function clearQuery(query) {
            query = query.replace("「", '').replace("」", '');
            return query.trim();
        }

        function searchNodeByQuery(nodes, query) {
            return nodes.find(node => query.includes( clearQuery(node.question) ));
        }
        
        async function fetchAndRenderLogs() {
            const container = document.getElementById('log-container');
            const statusEl = document.getElementById('status');

            try {
                // APIからデータを取得
                const response = await fetch(API_URL);
                if (!response.ok) {
                    throw new Error(`HTTPエラー! ステータス: ${response.status}`);
                }
                
                const data = await response.json();

                const [nodes, links, topics, practiceResults] = await fetchPsyNetwork();
                
                
                // ステータス非表示
                statusEl.style.display = 'none';
                container.innerHTML = '';

                // データをループ処理してHTMLを組み立てる
                data.forEach(item => {
                    let textBody = '';
                    let subTimestamp = '';
                    let count = '';

                    // body文字列をJSONとしてパースを試みる
                    try {
                        if (item.body) {
                            const parsedBody = JSON.parse(item.body);
                            textBody = parsedBody.text || '';
                            subTimestamp = parsedBody.timestamp || '';
                            count = parsedBody.count || '';

                        }
                    } catch (e) {
                        // 万が一bodyがJSON形式でない場合はそのままテキストとして扱う
                        textBody = item.body;
                    }
                    
                    console.log(searchNodeByQuery(nodes, textBody))

                    // ログカードのエレメントを作成
                    const logItem = document.createElement('div');
                    logItem.className = 'log-item';

                    let contentHtml = `
                        <div class="log-header">
                            <div class="log-id"># ${item.id}</div>
                            <div class="log-meta">
                                <span class="badge">${item.type}</span>
                                <span>時刻: ${item.timestamp}</span>
                            </div>
                        </div>
                        <div class="log-body">
                            <div class="log-text-container">
                                <p class="log-text">${escapeHtml(textBody)}</p>
                            </div>
                            <div class="log-submeta">
                                ${count ? `<span>Count: ${count}</span> | ` : ''}
                                <span>内部日時: ${escapeHtml(subTimestamp || item.timestamp)}</span>
                            </div>
                        </div>
                    `;
                    hit_node = searchNodeByQuery(nodes, textBody)
                    if (hit_node) {
                        console.log(hit_node)
                        contentHtml += `
                        <div class="related-node-card">
                            <span class="related-node-label">関連する心理学コンセプト</span>
                            <a href="${hit_node.page_url}" class="related-node-title" target="_blank" rel="noopener noreferrer">
                                ${escapeHtml(hit_node.question)}
                            </a>
                            <div class="related-node-content">
                                ${hit_node.example ? `<p><strong>例:</strong> ${escapeHtml(hit_node.example)}</p>` : ''}
                                ${hit_node.actions ? `<p><strong>アクション:</strong> ${escapeHtml(hit_node.actions.map(a => a.text).join(' / '))}</p>` : ''}
                            </div>
                        </div>
                        `;
                    }
                    
                    logItem.innerHTML = contentHtml;
                    container.appendChild(logItem);
                });

            } catch (error) {
                console.error('データの取得に失敗しました:', error);
                statusEl.className = 'status-error';
                statusEl.textContent = `データの読み込みに失敗しました。CORSポリシーやネットワーク接続を確認してください。 (エラー: ${error.message})`;
            }
        }

        // XSS対策のためのHTMLエスケープ関数
        function escapeHtml(string) {
            if (typeof string !== 'string') return string;
            return string.replace(/[&<>"']/g, function(match) {
                const escape = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#x27;'
                };
                return escape[match];
            });
        }

        // ページ読み込み時に実行
        window.addEventListener('DOMContentLoaded', fetchAndRenderLogs);
    </script>
</body>
</html>
