<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自動録音テスト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>


  <div class="container">

    <a href="https://minegishirei.github.io/dashboard/front/main.html">main</a>

    <h1>音声録音</h1>
    
    <!-- 初回操作を促すオーバーレイ（画面全体の案内） -->
    <div id="start-overlay" class="overlay">
      <p>画面をクリックすると録音を開始します</p>
    </div>

    <div class="status-box">
      <span id="status-badge" class="badge ready">準備完了</span>
      <p id="status-text">画面をクリックするか、開始ボタンを押してください。</p>
    </div>

    <div class="controls">
      <button id="start-btn" class="btn start">録音開始</button>
      <button id="stop-btn" class="btn stop" disabled>録音停止</button>
    </div>

    <div class="audio-preview">
      <h3>録音した音声の再生:</h3>
      <audio id="audio-playback" controls></audio>
    </div>

    <!-- ★ここを追加：文字起こし結果の表示エリア -->
    <div class="transcription-container">
      <h3>文字起こし結果:</h3>
      <div id="transcription-result" class="result-box">ここに文字起こし結果が表示されます</div>
    </div>


  </div>

  <script src="script.js"></script>
</body>
</html>

<style>
    /* 全体のリセットとベーススタイリング */
body {
  margin: 0;
  padding: 0;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background-color: #f4f7f6;
  color: #333;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: #ffffff;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
  width: 90%;
  max-width: 400px;
  text-align: center;
}

/* 状態表示バッジ */
.status-box {
  margin: 20px 0;
  padding: 15px;
  background: #fafafa;
  border-radius: 8px;
  border: 1px solid #eee;
}

.badge {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: bold;
  color: #fff;
}

.badge.ready { background-color: #9e9e9e; }
.badge.recording { background-color: #ff3b30; animation: pulse 1.5s infinite; }
.badge.stopped { background-color: #4cd964; }

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.5; }
  100% { opacity: 1; }
}

/* ボタンのスタイリング */
.controls {
  display: flex;
  justify-content: space-around;
  margin-bottom: 25px;
}

.btn {
  padding: 12px 24px;
  font-size: 1rem;
  font-weight: bold;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn:disabled {
  background-color: #e0e0e0 !important;
  color: #a6a6a6;
  cursor: not-allowed;
}

.btn.start { background-color: #007aff; color: white; }
.btn.start:hover:not(:disabled) { background-color: #0056b3; }

.btn.stop { background-color: #ff3b30; color: white; }
.btn.stop:hover:not(:disabled) { background-color: #c62828; }

/* オーディオプレイヤーエリア */
.audio-preview {
  margin-top: 20px;
  border-top: 1px solid #eee;
  padding-top: 20px;
}

audio {
  width: 100%;
  margin-top: 10px;
}

/* 初回クリックを促すオーバーレイ */
.overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.7);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 1.25rem;
  font-weight: bold;
  z-index: 1000;
  cursor: pointer;
}

/* 文字起こし結果エリアのスタイリング */
.transcription-container {
  margin-top: 20px;
  border-top: 1px solid #eee;
  padding-top: 20px;
  text-align: left;
}

.transcription-container h3 {
  text-align: center;
  font-size: 1rem;
  margin-bottom: 10px;
}

.result-box {
  background: #fff;
  border: 1px dashed #ccc;
  padding: 15px;
  border-radius: 6px;
  min-height: 60px;
  font-size: 0.95rem;
  line-height: 1.5;
  color: #555;
  word-break: break-all;
}
</style>

<script>
  let mediaRecorder = null;
let audioChunks = [];

// --- サーバー送信用の変数と設定 ---
const DJANGO_ENDPOINT = "https://d3jiguo628m5ch.cloudfront.net/instruments/";
let textQueue = [];        // 確定したテキストを一時的に溜める配列
let sendTimer = null;       // 定期送信用のタイマー
const SEND_INTERVAL = 5000; // 5秒ごとに送信チェック（ミリ秒）

// --- Web Speech API の初期化設定 ---
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let finalTranscript = ''; 

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';         
  recognition.interimResults = true;  
  recognition.continuous = true;      

  recognition.onresult = (event) => {
    let interimTranscript = '';
    
    for (let i = event.resultIndex; i < event.results.length; ++i) {
      if (event.results[i].isFinal) {
        // ★ 重複・漏れを防ぐコアロジック
        // 完全に「確定（isFinal）」したフレーズだけを抽出し、キューと画面用変数に追加
        const speechText = event.results[i][0].transcript.trim();
        if (speechText) {
          textQueue.push(speechText); // サーバー送信用のキューに入れる
          finalTranscript += speechText + ' '; // 画面表示用
        }
      } else {
        interimTranscript += event.results[i][0].transcript;
      }
    }
    // 画面のリアルタイム表示
    resultArea.textContent = finalTranscript + interimTranscript;
  };

  recognition.onerror = (event) => {
    console.error('音声認識エラー:', event.error);
  };
}

// --- ★ サーバー送信ロジック ---
function startDataSync() {
  // すでにタイマーが動いていたらクリア（二重起動防止）
  if (sendTimer) clearInterval(sendTimer);

  // 5秒ごとにキューをチェックして送信
  sendTimer = setInterval(() => {
    // キューが空（データがない）なら送信しない（無駄な通信を削減）
    if (textQueue.length === 0) return;

    // 送信するデータをキューから切り出す（送信中に次のデータが入っても混ざらないようにする）
    const dataToSend = [...textQueue];
    textQueue = []; // 即座にキューを空にする（重複送信の防止）

    // 送信用のデータ構造（ペイロード）を作成
    const payload = {
      text: dataToSend.join(' '), // 配列を1つの文章に結合
      count: dataToSend.length,
      timestamp: new Date().toISOString()
    };

    // Djangoサーバーへ送信
    fetch(DJANGO_ENDPOINT, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    })
    .then(response => {
      if (!response.ok) {
        console.warn(`【DRMaker送信エラー】ステータス: ${response.status}`);
        // 失敗時にデータを復元したい場合は、ここで textQueue = [...dataToSend, ...textQueue]; とする
      } else {
        console.log(`【DRMaker】5秒間の整形済みデータ（${payload.count}件）を送信しました。`);
      }
    })
    .catch(err => {
      console.error("【DRMakerネットワークエラー】:", err);
    });
  }, SEND_INTERVAL);
}

function stopDataSync() {
  if (sendTimer) {
    clearInterval(sendTimer);
    sendTimer = null;
  }
  // 録音停止時に、キューに残っている最後のデータを送信する（漏れ防止）
  if (textQueue.length > 0) {
    const payload = {
      text: textQueue.join(' '),
      count: textQueue.length,
      timestamp: new Date().toISOString()
    };
    textQueue = [];

    fetch(DJANGO_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    }).p.catch(err => console.error("最終データ送信エラー:", err));
  }
}

// DOM要素の取得
const overlay = document.getElementById('start-overlay');
const startBtn = document.getElementById('start-btn');
const stopBtn = document.getElementById('stop-btn');
const statusBadge = document.getElementById('status-badge');
const statusText = document.getElementById('status-text');
const audioPlayback = document.getElementById('audio-playback');
const resultArea = document.getElementById('transcription-result');

// 録音を開始する関数
async function startRecording() {
  try {
    finalTranscript = '';
    textQueue = []; // キューの初期化
    if (resultArea) resultArea.textContent = '音声を聞き取っています...';

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];

    mediaRecorder.ondataavailable = (event) => {
      if (event.data.size > 0) audioChunks.push(event.data);
    };

    mediaRecorder.onstop = () => {
      const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
      const audioUrl = URL.createObjectURL(audioBlob);
      audioPlayback.src = audioUrl;
      stream.getTracks().forEach(track => track.stop());

      if (!finalTranscript && resultArea.textContent === '音声を聞き取っています...') {
        resultArea.textContent = '（音声がうまく聞き取れませんでした）';
      }
    };

    // 録音、音声認識、サーバー同期のすべてをスタート！
    mediaRecorder.start();
    if (recognition) recognition.start();
    startDataSync(); // ★送信タイマースタート
    
    updateUI('recording');

  } catch (error) {
    console.error('マイクの起動に失敗しました:', error);
    statusText.innerText = 'マイクの許可がない、またはデバイスが見つかりません。';
    updateUI('ready');
  }
}

// 録音を停止する関数
function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
    if (recognition) recognition.stop();
    stopDataSync(); // ★送信タイマー停止＆残データ処理
    updateUI('stopped');
  }
}

// UIの表示状態を切り替える関数（変更なし）
function updateUI(state) {
  if (state === 'recording') {
    statusBadge.textContent = '録音中';
    statusBadge.className = 'badge recording';
    statusText.textContent = '音声を録音し、文字起こしをしています...';
    startBtn.disabled = true;
    stopBtn.disabled = false;
  } else if (state === 'stopped') {
    statusBadge.textContent = '録音完了';
    statusBadge.className = 'badge stopped';
    statusText.textContent = '完了しました。録音再生と文字起こし結果を確認できます。';
    startBtn.disabled = false;
    stopBtn.disabled = true;
  } else {
    statusBadge.textContent = '準備完了';
    statusBadge.className = 'badge ready';
    startBtn.disabled = false;
    stopBtn.disabled = true;
  }
}

// イベントリスナー
overlay.addEventListener('click', () => {
  overlay.style.display = 'none';
  startRecording();
});
startBtn.addEventListener('click', startRecording);
stopBtn.addEventListener('click', stopRecording);
</script>
