

<!DOCTYPE html>

	<style>
		body {
			margin: 0;
			padding: 0;
			min-height: 100vh;
			background: linear-gradient(135deg, #e0e7ff 0%, #f8fafc 100%);
			display: flex;
			justify-content: center;
			align-items: center;
			font-family: 'Roboto', 'Helvetica Neue', Arial, sans-serif;
			color: #222;
		}

			background: #fff;

			display: flex;
			flex-direction: column;
			align-items: center;
			min-width: 320px;
			max-width: 400px;
		}
		h1 {
			font-size: 2rem;
			margin-bottom: 28px;
			font-weight: 700;
			letter-spacing: 0.04em;
			color: #3b3b7a;
		}
		.link-list {
			width: 100%;
			display: flex;
			flex-direction: column;
			gap: 18px;
		}
		.card-link {
			display: block;
			padding: 18px 0;
			background: linear-gradient(90deg, #a5b4fc 0%, #f0abfc 100%);
			color: #fff;
			text-decoration: none;
			border-radius: 10px;
			font-size: 1.1rem;
			font-weight: 500;
			text-align: center;
			box-shadow: 0 2px 8px rgba(120, 120, 180, 0.08);
			transition: transform 0.13s, box-shadow 0.13s, background 0.2s;
			letter-spacing: 0.02em;
		}
		.card-link:hover {
			transform: translateY(-2px) scale(1.03);
			box-shadow: 0 6px 18px rgba(80, 80, 160, 0.13);
			background: linear-gradient(90deg, #6366f1 0%, #e879f9 100%);
		}
		@media (max-width: 480px) {
			.container {
				padding: 20px 6px;
				min-width: unset;
				max-width: 98vw;
			}
			h1 {
				font-size: 1.3rem;
			}
			.card-link {
				font-size: 1rem;
				padding: 14px 0;
			}
		}
	</style>
</head>
