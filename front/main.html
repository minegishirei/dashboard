

<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dashboard Main</title>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
	<style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --border-color: #f1f5f9;
            --accent-bg: #eff6ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 48px;
        }

		h1 {
            font-size: 2.25rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.025em;
            margin: 0;
		}

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .section-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }

        .section-card h2 {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 0 0 16px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-card h2::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card-link {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-color);
            color: var(--text-main);
            text-decoration: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .card-link:hover {
            background: var(--accent-bg);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateX(4px);
        }

        .card-link.external::after {
            content: "↗";
            margin-left: auto;
            font-size: 0.8rem;
            opacity: 0.5;
        }

        .info-text {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 8px;
            padding-left: 16px;
            border-left: 2px solid var(--border-color);
        }

        @media (max-width: 640px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
	</style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Dashboard Main</h1>
        </header>

        <div class="dashboard-grid">
            <section class="section-card">
                <h2>Main</h2>
                <div class="link-list">
                    <a class="card-link" href="https://minegishirei.github.io/dashboard/front/main.html">Main Dashboard</a>
                </div>
            </section>

            <section class="section-card">
                <h2>Instruments</h2>
                <div class="link-list">
                    <a class="card-link" href="https://minegishirei.github.io/dashboard/front/instrument-voice.html">Instrument Voice</a>
                    <a class="card-link" href="https://minegishirei.github.io/dashboard/front/extension/">Instrument Form</a>
                    <div class="info-text">Shortcuts: chrome://extensions/shortcuts</div>
                </div>
            </section>

            <section class="section-card">
                <h2>Analysis</h2>
                <div class="link-list">
                    <a class="card-link" href="https://minegishirei.github.io/dashboard/front/psy-network.html">Psy Network Map</a>
                    <a class="card-link" href="https://minegishirei.github.io/dashboard/front/log.html">Activity Logs</a>
                    <a class="card-link" href="https://minegishirei.github.io/dashboard/front/instruments_analysis.html">AI Insights</a>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
