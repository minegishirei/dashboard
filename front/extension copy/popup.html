<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; padding: 15px; font-family: Arial, sans-serif; }
    h3 { margin-top: 0; color: #333; }
    input[type="password"] { width: 100%; padding: 8px; box-sizing: border-box; margin-bottom: 10px; }
    button { width: 100%; padding: 8px; background-color: #007bff; color: white; border: none; cursor: pointer; }
    button:hover { background-color: #0056b3; }
    .status { color: green; font-size: 12px; margin-top: 5px; text-align: center; }
  </style>
</head>
<body>
  <h3>DRMaker 設定</h3>
  <label for="apiKey">アクセスキーを入力：</label>
  <!-- キーが盗み見られないように type="password" にしています -->
  <input type="password" id="apiKey" placeholder="ここにキーを入力（例: sk-...）">
  <button id="saveBtn">キーを保存する</button>
  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
