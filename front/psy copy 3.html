<!DOCTYPE html>
<html lang="en">

<body>
    <script src="https://cdn.jsdelivr.net/npm/gojs@3.0.19/release/go.js"></script>

    <div id="allSampleContent" class="p-4 w-full">




        <script src="https://cdn.jsdelivr.net/npm/create-gojs-kit@3.0.19/dist/extensions/Figures.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/create-gojs-kit@3.0.19/dist/extensions/Themes.js"></script>
        <script id="code">
            var diagrams = [];
            var currentData = null;
            var isSample = true;
            var isExplainOpen = false;
            var topicOrder = [];
            var topicUrl = 'https://raw.githubusercontent.com/minegishirei/dashboard/refs/heads/main/data/psy/json/topic.json';

            function createDiagram(divId) {
                var diagram = new go.Diagram(divId, {
                    allowCopy: false,
                    'draggingTool.dragsTree': true,
                    'commandHandler.deletesTree': true,
                    'undoManager.isEnabled': true,
                    layout: new go.TreeLayout({ angle: 90, arrangement: go.TreeArrangement.FixedRoots }),
                    'themeManager.themeMap': new go.Map([
                        { key: 'light', value: Modern },
                        { key: 'dark', value: ModernDark }
                    ]),
                    'themeManager.changesDivBackground': true,
                    'themeManager.currentTheme': document.getElementById('theme').value || 'system'
                });

                diagram.themeManager.set('', {
                    colors: {
                        primary: '#155e75',
                        terminal: '#047857'
                    }
                });

                diagram.addDiagramListener('Modified', function (e) {
                    var button = document.getElementById('SaveButton');
                    if (button) button.disabled = !diagram.isModified;
                    var idx = document.title.indexOf('*');
                    if (diagram.isModified) {
                        if (idx < 0) document.title += '*';
                    } else {
                        if (idx >= 0) document.title = document.title.slice(0, idx);
                    }
                });

                go.Shape.defineFigureGenerator('Van', function (shape, w, h) {
                    var geo = go.Geometry.parse(
                        'M37.409,18.905l-4.946-7.924c-0.548-0.878-1.51-1.411-2.545-1.411H3c-1.657,0-3,1.343-3,3v16.86c0,1.657,1.343,3,3,3h0.787 c0.758,1.618,2.391,2.75,4.293,2.75s3.534-1.132,4.292-2.75h20.007c0.758,1.618,2.391,2.75,4.293,2.75 c1.9,0,3.534-1.132,4.291-2.75h0.787c1.656,0,3-1.343,3-3v-2.496C44.75,22.737,41.516,19.272,37.409,18.905z M8.087,32.395 c-1.084,0-1.963-0.879-1.963-1.963s0.879-1.964,1.963-1.964s1.963,0.88,1.963,1.964S9.171,32.395,8.087,32.395z M26.042,21.001 V15.57v-2.999h3.876l5.264,8.43H26.042z M36.671,32.395c-1.084,0-1.963-0.879-1.963-1.963s0.879-1.964,1.963-1.964 s1.963,0.88,1.963,1.964S37.755,32.395,36.671,32.395z'
                    );
                    return geo.scale(w / geo.bounds.width, h / geo.bounds.height);
                });
                go.Shape.defineFigureGenerator('SUV', function (shape, w, h) {
                    var geo = go.Geometry.parse(
                        'M246,90.011V59.995c0-5.523-4.48-9.995-10-9.995h-50L156.97,6.416C155.11,3.634,152.34,2,149,2H28 c-5.52,0-10,4.446-10,9.969V30h-8c-4.42,0-8,3.56-8,7.983v40.022C2,82.427,5.58,86,10,86h8v20h16.458 c2.8-15.959,16.702-28.066,33.462-28.066c16.75,0,30.708,12.107,33.518,28.066h72.958c2.8-15.959,16.764-28.066,33.524-28.066 c16.75,0,30.624,12.107,33.434,28.066H250c4.42,0,8-3.563,8-7.985v-8.004H246z M86,50H30V13.97h56V50z M98,50V13.97h48L170,50H98z M68,138c-14.336,0-26.083-11.706-26.083-26.051s11.664-26.014,26-26.014s26,11.669,26,26.014S82.336,138,68,138z M67.917,99.943 c-6.617,0-12,5.386-12,12.006c0,6.621,5.383,12.006,12,12.006s12-5.386,12-12.006C79.917,105.329,74.534,99.943,67.917,99.943z M208,138c-14.337,0-26.083-11.706-26.083-26.051s11.663-26.014,26-26.014s26,11.669,26,26.014S222.337,138,208,138z M207.917,99.943c-6.617,0-12,5.386-12,12.006c0,6.621,5.383,12.006,12,12.006s12-5.386,12-12.006 C219.917,105.329,214.534,99.943,207.917,99.943z'
                    );
                    return geo.scale(w / geo.bounds.width, h / geo.bounds.height);
                });
                go.Shape.defineFigureGenerator('Hammer', function (shape, w, h) {
                    var geo = go.Geometry.parse(
                        'M19 5.5a4.5 4.5 0 01-4.791 4.49c-.873-.055-1.808.128-2.368.8l-6.024 7.23a2.724 2.724 0 11-3.837-3.837L9.21 8.16c.672-.56.855-1.495.8-2.368a4.5 4.5 0 015.873-4.575c.324.105.39.51.15.752L13.34 4.66a.455.455 0 00-.11.494 3.01 3.01 0 001.617 1.617c.17.07.363.02.493-.111l2.692-2.692c.241-.241.647-.174.752.15.14.435.216.9.216 1.382zM4 17a1 1 0 100-2 1 1 0 000 2z'
                    );
                    return geo.scale(w / geo.bounds.width, h / geo.bounds.height);
                });

                var actionTemplate = new go.Panel('TableRow')
                    .add(
                        new go.Shape({ column: 0, width: 20, height: 20, fill: null }).bind('figure').theme('stroke', 'text'),
                        new go.TextBlock({ column: 1 }, { font: '11pt Verdana, sans-serif' }).bind('text').theme('stroke', 'text'),
                        new go.TextBlock({ column: 2, font: '11pt Verdana, sans-serif' })
                            .bindObject('text', 'itemIndex', function (i) { return '[' + i + ']'; })
                            .theme('stroke', 'text')
                    );

                var regularNodeColor = function (category) {
                    if (category === 'write') return '#155e75';
                    if (category === 'read') return '#7D1C4A';
                    if (category === 'persol') return '#493D60';
                    return '#155e75';
                };

                diagram.nodeTemplate =
                    new go.Node('Vertical', { selectionObjectName: 'BODY' })
                        .bindTwoWay('isTreeExpanded')
                        .bindTwoWay('wasTreeExpanded')
                        .add(
                            new go.Panel('Auto', { name: 'BODY' })
                                .add(
                                    new go.Shape('RoundedRectangle', { strokeWidth: 0 }).bind('fill', 'method', regularNodeColor),
                                    new go.Panel('Vertical', { margin: 3 })
                                        .add(
                                            new go.TextBlock({
                                                stretch: go.Stretch.Horizontal,
                                                font: 'bold 12pt Verdana, sans-serif',
                                                stroke: 'white',
                                                cursor: 'pointer',
                                                isUnderline: false,
                                                click: function (e, obj) {
                                                    var data = obj.part && obj.part.data;
                                                    if (data && typeof data.page_url === 'string' && data.page_url.length > 0) {
                                                        window.open(data.page_url, '_blank');
                                                    }
                                                }
                                            })
                                                .bind('text', 'question'),
                                            new go.Panel('Vertical', {
                                                stretch: go.Stretch.Horizontal,
                                                visible: false
                                            })
                                                .bind('visible', 'actions', function (acts) { return Array.isArray(acts) && acts.length > 0; })
                                                .add(
                                                    new go.Panel('Table', { stretch: go.Stretch.Horizontal })
                                                        .add(
                                                            new go.TextBlock('Example', {
                                                                alignment: go.Spot.Left,
                                                                font: '10pt Verdana, sans-serif',
                                                                stroke: 'white'
                                                            }),
                                                            go.GraphObject.build('PanelExpanderButton',
                                                                {
                                                                    column: 1,
                                                                    alignment: go.Spot.Right,
                                                                    'ButtonIcon.stroke': 'white'
                                                                },
                                                                'COLLAPSIBLE'
                                                            )
                                                        ),
                                                    new go.Panel('Table', {
                                                        name: 'COLLAPSIBLE',
                                                        visible: isExplainOpen,
                                                        padding: 2,
                                                        stretch: go.Stretch.Horizontal,
                                                        defaultAlignment: go.Spot.Left,
                                                        defaultSeparatorPadding: 3,
                                                        itemTemplate: actionTemplate
                                                    })
                                                        .theme('background', 'div')
                                                        .bind('itemArray', 'actions')
                                                )
                                        )
                                ),
                            new go.Panel({ height: 17 }).add(go.GraphObject.build('TreeExpanderButton'))
                        );

                diagram.nodeTemplateMap.add(
                    'Terminal',
                    new go.Node('Spot')
                        .add(
                            new go.Shape('Circle', { width: 55, height: 55, strokeWidth: 0 }).theme('fill', 'terminal'),
                            new go.TextBlock({ font: '10pt Verdana, sans-serif', stroke: 'white' }).bind('text')
                        )
                );

                diagram.linkTemplate = new go.Link({ routing: go.Routing.Orthogonal, deletable: false, corner: 10, toShortLength: 4 })
                    .add(
                        new go.Shape({ strokeWidth: 2 }).theme('stroke', 'link'),
                        new go.Shape({ toArrow: 'Standard', strokeWidth: 0 }).theme('fill', 'link')
                    );

                diagram.layout = new go.LayeredDigraphLayout({
                    direction: 90,
                    layerSpacing: 50,
                    columnSpacing: 30,
                    setsSpacing: 150
                });

                return diagram;
            }

            function connectedComponents(nodeDataArray, linkDataArray) {
                var nodes = Array.isArray(nodeDataArray) ? nodeDataArray : [];
                var links = Array.isArray(linkDataArray) ? linkDataArray : [];
                var adjacency = new Map();
                nodes.forEach(function (node) {
                    if (node && node.key != null) {
                        adjacency.set(node.key, new Set());
                    }
                });
                links.forEach(function (link) {
                    if (!link || link.from == null || link.to == null) return;
                    if (adjacency.has(link.from) && adjacency.has(link.to)) {
                        adjacency.get(link.from).add(link.to);
                        adjacency.get(link.to).add(link.from);
                    }
                });
                var visited = new Set();
                var components = [];
                adjacency.forEach(function (_, key) {
                    if (visited.has(key)) return;
                    var stack = [key];
                    var compKeys = new Set();
                    visited.add(key);
                    while (stack.length) {
                        var current = stack.pop();
                        compKeys.add(current);
                        adjacency.get(current).forEach(function (neighbor) {
                            if (!visited.has(neighbor)) {
                                visited.add(neighbor);
                                stack.push(neighbor);
                            }
                        });
                    }
                    components.push(compKeys);
                });
                return components.map(function (keySet, index) {
                    return {
                        title: 'Tree ' + (index + 1),
                        nodeDataArray: nodes.filter(function (node) { return node && node.key != null && keySet.has(node.key); }),
                        linkDataArray: links.filter(function (link) {
                            return link && link.from != null && link.to != null && keySet.has(link.from) && keySet.has(link.to);
                        })
                    };
                });
            }

            function normalizeText(value) {
                return String(value || '').toLowerCase();
            }

            function componentTopicPriority(component, topics) {
                if (!Array.isArray(topics) || topics.length === 0) return topics.length;
                var text = '';
                component.nodeDataArray.forEach(function (node) {
                    text += ' ' + JSON.stringify(node);
                });
                text = normalizeText(text);
                for (var i = 0; i < topics.length; i++) {
                    var topic = normalizeText(topics[i]);
                    if (topic && text.indexOf(topic) !== -1) {
                        return i;
                    }
                }
                return topics.length;
            }

            function sortComponentsByTopics(components, topics) {
                if (!Array.isArray(topics) || topics.length === 0) return components;
                return components.slice().sort(function (a, b) {
                    var pa = componentTopicPriority(a, topics);
                    var pb = componentTopicPriority(b, topics);
                    if (pa !== pb) return pa - pb;
                    return a.title.localeCompare(b.title);
                });
            }

            function renderDiagrams(data, topics) {
                currentData = data;
                var container = document.getElementById('diagramContainer');
                container.innerHTML = '';
                diagrams.length = 0;

                var components = connectedComponents(data.nodeDataArray, data.linkDataArray);
                components = sortComponentsByTopics(components, topics);
                if (components.length === 0) {
                    container.innerHTML = '<div>No diagram data available.</div>';
                    return;
                }

                components.forEach(function (component, index) {
                    var wrapper = document.createElement('div');
                    var title = document.createElement('h3');
                    title.textContent = component.title;
                    title.style.margin = '8px 0 4px';
                    wrapper.appendChild(title);

                    var div = document.createElement('div');
                    div.id = 'myDiagramDiv_' + index;
                    div.style.border = 'solid 1px black';
                    div.style.width = '100%';
                    div.style.height = '90vh';
                    wrapper.appendChild(div);

                    container.appendChild(wrapper);

                    var diagram = createDiagram(div.id);
                    diagram.model = new go.GraphLinksModel({
                        copiesArrays: true,
                        copiesArrayObjects: true,
                        nodeDataArray: component.nodeDataArray,
                        linkDataArray: component.linkDataArray
                    });
                    diagrams.push(diagram);
                });
            }

            var nodeDataArray = [];
            var linkDataArray = [];

            function init() {
                loadData();
            }

            const changeTheme = function () {
                var themeValue = document.getElementById('theme').value;
                diagrams.forEach(function (diagram) {
                    if (diagram) diagram.themeManager.currentTheme = themeValue;
                });
            };

            const changeIsExplainOpen = function () {
                isExplainOpen = document.getElementById('isExplainOpen').value === 'true';
                if (currentData) renderDiagrams(currentData, topicOrder);
            };

            var dataUrl = 'https://raw.githubusercontent.com/minegishirei/dashboard/refs/heads/main/data/psy/json/main.json';
            function loadData() {
                Promise.all([
                    fetch(dataUrl).then(function (response) { return response.json(); }),
                    fetch(topicUrl).then(function (response) { return response.json(); }).catch(function () { return ['一貫性の法則', '未来', '無力感']; })
                ])
                    .then(function (result) {
                        var data = result[0];
                        var topics = Array.isArray(result[1]) ? result[1] : ['一貫性の法則', '未来', '無力感'];
                        topicOrder = topics;
                        if (!data || !data.nodeDataArray) {
                            renderDiagrams({ nodeDataArray: nodeDataArray, linkDataArray: linkDataArray }, topicOrder);
                        } else {
                            renderDiagrams(data, topicOrder);
                        }
                    })
                    .catch(function (error) {
                        console.error('データの読み込みに失敗しました:', error);
                        renderDiagrams({ nodeDataArray: nodeDataArray, linkDataArray: linkDataArray }, topicOrder);
                    });
            }

            window.addEventListener('DOMContentLoaded', init);


        </script>

        <div id="sample">
            <div id="diagramContainer" style="width: 80%; height: 90vh;"></div>
            Theme:
            <select id="theme" onchange="changeTheme()">
                <option value="system">System</option>
                <option value="light">Light</option>
                <option value="dark">Dark</option>
            </select>
            isExplainOpen:
            <select id="isExplainOpen" onchange="changeIsExplainOpen()">
                <option value="true">true</option>
                <option value="false">false</option>
            </select>
        </div>


    </div>
</body>

</html>
